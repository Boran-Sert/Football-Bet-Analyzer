version: '3.8'

services:
  backend:
    build: .
    container_name: football_saas_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/football_saas?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      - mongodb
      - redis
    networks:
      - saas_network

  mongodb:
    image: mongo:latest
    container_name: football_saas_mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - saas_network

  redis:
    image: redis:alpine
    container_name: football_saas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - saas_network

networks:
  saas_network:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
